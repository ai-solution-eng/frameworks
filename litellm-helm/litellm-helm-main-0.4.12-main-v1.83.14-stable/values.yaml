# Default values for litellm.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1
# numWorkers: 2

image:
  # Use "ghcr.io/berriai/litellm-database" for optimized image with database
  repository: ghcr.io/berriai/litellm-database
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  # tag: "main-latest"
  tag: "main-v1.83.14-stable"

imagePullSecrets: []
nameOverride: "litellm"
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# annotations for litellm deployment
deploymentAnnotations: {}
deploymentLabels: {}
# annotations for litellm pods
podAnnotations: {}
podLabels: {}

terminationGracePeriodSeconds: 90
topologySpreadConstraints:
  []
  # - maxSkew: 1
  #   topologyKey: kubernetes.io/hostname
  #   whenUnsatisfiable: DoNotSchedule
  #   labelSelector:
  #     matchLabels:
  #       app: litellm

# At the time of writing, the litellm docker image requires write access to the
#  filesystem on startup so that prisma can install some dependencies.
podSecurityContext: {}
securityContext:
  {}
  # capabilities:
  #   drop:
  #     - ALL
  # readOnlyRootFilesystem: false
  # runAsNonRoot: true
  # runAsUser: 1000

# A list of Kubernetes Secret objects that will be exported to the LiteLLM proxy
#  pod as environment variables.  These secrets can then be referenced in the
#  configuration file (or "litellm" ConfigMap) with `os.environ/<Env Var Name>`
environmentSecrets:
  []
  # - litellm-env-secret

# A list of Kubernetes ConfigMap objects that will be exported to the LiteLLM proxy
#  pod as environment variables.  The ConfigMap kv-pairs can then be referenced in the
#  configuration file (or "litellm" ConfigMap) with `os.environ/<Env Var Name>`
environmentConfigMaps:
  []
  # - litellm-env-configmap

service:
  type: ClusterIP
  port: 4000
  # If service type is `LoadBalancer` you can
  # optionally specify loadBalancerClass
  # loadBalancerClass: tailscale

# Separate health app configuration
# When enabled, health checks will use a separate port and the application
# will receive SEPARATE_HEALTH_APP=1 and SEPARATE_HEALTH_PORT from environment variables
separateHealthApp: false
separateHealthPort: 8081

ingress:
  enabled: false
  className: "nginx"
  labels: {}
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: api.example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

masterkey: sk-master-admin-key # CHANGE THIS

# if set, use this secret for the master key; otherwise, autogenerate a new one
masterkeySecretName: ""

# if set, use this secret key for the master key; otherwise, use the default key
masterkeySecretKey: ""

proxyConfigMap:
  # when true, creates a new configmap
  create: true
  # if create is false and name is set, use existing ConfigMap
  # create: false
  # name: ""
  # key: "config.yaml"

# The elements within proxy_config are rendered as config.yaml for the proxy
#  Examples: https://github.com/BerriAI/litellm/tree/main/litellm/proxy/example_config_yaml
#  Reference: https://docs.litellm.ai/docs/proxy/configs
proxy_config:
  # At least one model must exist for the proxy to start when `STORE_MODEL_IN_DB` is not set to `True`
  # model_list:
  #  # Sample configuration for local model deployed on MLIS
  #  - model_name: PCAI-Llama-3.2-1B-Instruct
  #    litellm_params:
  #      model: hosted_vllm/meta/llama-3.2-1b-instruct
  #      api_key: "<MLIS_endpoint_token>"
  #      api_base: https://llama-32-1b-instruct.project-user-jose-claudio-calderon.serving.aie01.pcai.tryezmeral.com/
  general_settings:
    master_key: os.environ/PROXY_MASTER_KEY
    use_x_forwarded_for: true 
    user_header_mappings:
      - header_name: X-OpenWebUI-User-Email
        litellm_user_role: internal_user
      - header_name: X-OpenWebUI-User-Email
        litellm_user_role: customer
  litellm_settings:
    # Logging/Callback settings
    success_callback: ["langfuse"]  # list of success callbacks
    failure_callback: ["langfuse"]  # list of failure callbacks
    turn_off_message_logging: false    # Set true to suppress bodies 

    langfuse_default_tags: ["cache_hit", "cache_key", "proxy_base_url", "user_api_key_alias", "user_api_key_user_id", "user_api_key_user_email", "user_api_key_team_alias", "semantic-similarity", "requester_ip_address"] # default tags for Langfuse Logging
  environment_variables: {}

resources:
  {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes:
  - name: ezaf-root-ca
    configMap:
      name: ezaf-root-ca
      defaultMode: 420
      items:
        - key: ezaf-root-ca.crt
          path: ca-certificates.crt
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts:
  - name: ezaf-root-ca
    mountPath: /etc/ssl/certs/ca-certificates.crt
    subPath: ca-certificates.crt
    readOnly: true
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

db:
  # Use an existing postgres server/cluster
  useExisting: false

  # How to connect to the existing postgres server/cluster
  endpoint: localhost
  database: litellm
  url: postgresql://$(DATABASE_USERNAME):$(DATABASE_PASSWORD)@$(DATABASE_HOST)/$(DATABASE_NAME)
  secret:
    name: postgres
    usernameKey: username
    passwordKey: password
    # Optional: when set, DATABASE_HOST will be sourced from this secret key instead of db.endpoint
    endpointKey: ""

  # Use the Stackgres Helm chart to deploy an instance of a Stackgres cluster.
  #  The Stackgres Operator must already be installed within the target
  #  Kubernetes cluster.
  # TODO: Stackgres deployment currently unsupported
  useStackgresOperator: false

  # Use the Postgres Helm chart to create a single node, stand alone postgres
  #  instance.  See the "postgresql" top level key for additional configuration.
  deployStandalone: true

# Settings for Bitnami postgresql chart (if db.deployStandalone is true, ignored
#  otherwise)
postgresql:
  architecture: standalone
  auth:
    username: litellm
    database: litellm

    # You should override these on the helm command line with
    #  `--set postgresql.auth.postgres-password=<some good password>,postgresql.auth.password=<some good password>`
    password: NoTaGrEaTpAsSwOrD
    postgres-password: NoTaGrEaTpAsSwOrD

    # A secret is created by this chart (litellm-helm) with the credentials that
    #  the new Postgres instance should use.
    # existingSecret: ""
    # secretKeys:
    #   userPasswordKey: password

# requires cache: true in config file
# either enable this or pass a secret for REDIS_HOST, REDIS_PORT, REDIS_PASSWORD or REDIS_URL
# with cache: true to use existing redis instance
redis:
  enabled: false
  architecture: standalone

# =============================================================================
# Prisma database migrations
#
# WHO RUNS THE SCHEMA MIGRATION? There are exactly two supported owners, and only
# one of them should ever run migrations at a time:
#
#   (A) The pre-sync migration Job   -> migrationJob.enabled: true
#   (B) The LiteLLM proxy on startup -> migrationJob.enabled: false
#
# The single control that decides whether the PROXY PODS migrate is the
# DISABLE_SCHEMA_UPDATE env var on the pods (set under `envVars:` below).
# The Job, when enabled, always migrates (it forces DISABLE_SCHEMA_UPDATE=false
# on itself internally, regardless of the value below).
#
# -----------------------------------------------------------------------------
# OFFICIAL PRODUCTION RECOMMENDATION (multi-replica) — docs.litellm.ai/docs/proxy/prod #7
#   migrationJob.enabled: true          # the pre-sync Job owns migrations
#   envVars.DISABLE_SCHEMA_UPDATE: "true"  # pods do NOT migrate -> no concurrent
#                                          # migration attempts across replicas
#   envVars.USE_PRISMA_MIGRATE: "True"     # use `prisma migrate deploy` (versioned,
#                                          # populates _prisma_migrations) — required by
#                                          # the documented rollback procedure
#
# SINGLE-REPLICA / FRESH INSTALL (replicaCount: 1)
#   migrationJob.enabled: false         # no separate Job; the one proxy pod
#                                       # self-migrates on first boot
#   Leave DISABLE_SCHEMA_UPDATE UNSET (or "false") so the pod is allowed to migrate.
#
#   >> NEVER set BOTH migrationJob.enabled: false AND DISABLE_SCHEMA_UPDATE: "true". <<
#      That leaves no owner for the schema, and on an empty DB LiteLLM will crash with
#      `relation "LiteLLM_..." does not exist`.
#
# WHEN TO SWITCH (A) <-> (B): if you raise replicaCount above 1, switch to (A) so
# multiple pods don't race to migrate during a rolling deploy.
#
# NOTE on `disableSchemaUpdate` below: in this chart version (litellm-helm 0.4.10)
# this key is NOT wired to any template — changing it has no effect. It is kept only
# to match the upstream values schema. Use the pod-level DISABLE_SCHEMA_UPDATE env
# (under `envVars:`) to control pod migration behavior.
# =============================================================================
migrationJob:
  enabled: false   # (B) single-replica self-migration — matches replicaCount: 1 above.
                   # For production multi-replica, set true and see the block above.
  retries: 3 # Number of retries for the Job in case of failure
  backoffLimit: 4 # Backoff limit for Job restarts
  disableSchemaUpdate: false # NO-OP in this chart version (see note above). Control pod
                             # migration via DISABLE_SCHEMA_UPDATE in envVars instead.
  annotations: {}
  ttlSecondsAfterFinished: 120
  resources: {}
  #  requests:
  #    cpu: 100m
  #    memory: 100Mi
  extraContainers: []

  # Hook configuration — only relevant when migrationJob.enabled: true.
  # IMPORTANT for PCAI/GitOps: the Job carries Helm hook annotations
  # (helm.sh/hook: pre-install,pre-upgrade). If your platform syncs via ArgoCD,
  # Helm hooks are ignored — set hooks.argocd.enabled: true so the Job runs as an
  # ArgoCD PreSync hook instead. Confirm which engine PCAI uses before relying on it.
  hooks:
    argocd:
      enabled: false  # set true if deployed/synced by ArgoCD
    helm:
      enabled: true   # standard Helm hooks (helm install/upgrade)
      # This policy ensures the old job is deleted before a new one is created
      deletePolicy: "before-hook-creation,hook-succeeded" 

# Additional environment variables to be added to the deployment as a map of key-value pairs
envVars:
  # In production environments, passwords, keys and SALT should be in a secret.
  UI_USERNAME: "admin"
  UI_PASSWORD: "password"
  LANGFUSE_HOST: "http://langfuse-web.langfuse.svc.cluster.local:3000"
  LANGFUSE_PUBLIC_KEY: "lf_pk_1234567890"
  LANGFUSE_SECRET_KEY: "lf_sk_1234567890"
  STORE_MODEL_IN_DB: "True"
  REQUESTS_CA_BUNDLE: "/etc/ssl/certs/ca-certificates.crt"
  SSL_CERT_FILE: "/etc/ssl/certs/ca-certificates.crt"
  AIOHTTP_CLIENT_SESSION_SSL: "/etc/ssl/certs/ca-certificates.crt"
  # Do NOT change LITELLM_SALT_KEY after adding any model/credential — it encrypts stored
  # API keys. Changing it (including during a rollback) makes existing credentials unreadable.
  # docs.litellm.ai/docs/proxy/prod#8 / docs.litellm.ai/docs/troubleshoot/rollback#3
  LITELLM_SALT_KEY: "3WbPlo9mEGQ2X5CYjTYGmavNO/JqJaYpJiE0mf0xhGw="

  # --- Database schema migration control (read the migrationJob block above first) ---
  #
  # Current mode = single-replica self-migration (migrationJob.enabled: false):
  #   leave DISABLE_SCHEMA_UPDATE unset so this pod migrates on boot.
  #
  # Production multi-replica mode (migrationJob.enabled: true): UNCOMMENT the next line so
  # the pods stop migrating and only the pre-sync Job does. Setting it now (with the Job
  # disabled) would break a fresh install — nothing would create the schema.
  # DISABLE_SCHEMA_UPDATE: "true"
  #
  # Recommended for production in BOTH modes: use versioned `prisma migrate deploy` rather
  # than `prisma db push`. This populates the _prisma_migrations table that the documented
  # rollback procedure (delete stale migration rows, then restart) depends on.
  # docs.litellm.ai/docs/proxy/prod#9
  USE_PRISMA_MIGRATE: "True"

# USE_DDTRACE: "true"
# Additional environment variables to be added to the deployment as a list of k8s env vars
extraEnvVars: {}

# if you want to override the container command, you can do so here
command: {}
# if you want to override the container args, you can do so here
args: {}

# - name: EXTRA_ENV_VAR
#   value: EXTRA_ENV_VAR_VALUE
# Additional Kubernetes resources to deploy with litellm
extraResources: []

# - apiVersion: v1
#   kind: ConfigMap
#   metadata:
#     name: my-extra-config
#   data:
#     foo: bar
# Pod Disruption Budget
pdb:
  enabled: false
  # Set exactly one of the following. If both are set, minAvailable takes precedence.
  minAvailable: null # e.g. "50%" or 1
  maxUnavailable: null # e.g. 1 or "20%"
  annotations: {}
  labels: {}

serviceMonitor:
  enabled: false
  labels:
    {}
    # test: test
  annotations:
    {}
    # kubernetes.io/test: test
  interval: 15s
  scrapeTimeout: 10s
  relabelings: []
  # - targetLabel: __meta_kubernetes_pod_node_name
  #   replacement: $1
  #   action: replace
  namespaceSelector:
    matchNames: []
    # - test-namespace

ezua:
  virtualService:
    # The endpoint where the service will be accessible (e.g., "service-name.${DOMAIN_NAME}")
    endpoint: "litellm.${DOMAIN_NAME}"
    # The Istio Gateway to use (e.g., "istio-system/ezaf-gateway")
    istioGateway: "istio-system/ezaf-gateway"