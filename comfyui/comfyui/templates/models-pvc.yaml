{{- if .Values.modelsPVC.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "comfyui.fullname" . }}-models-pvc
  labels:
    {{- include "comfyui.labels" . | nindent 4 }}
spec:
  accessModes:
  - {{ .Values.modelsPVC.accessMode }}
  resources:
    requests:
      storage: {{ .Values.modelsPVC.size }}
{{- end }}