{{- if .Values.outputPVC.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "comfyui.fullname" . }}-output-pvc
  labels:
    {{- include "comfyui.labels" . | nindent 4 }}
spec:
  accessModes:
  - {{ .Values.outputPVC.accessMode }}
  resources:
    requests:
      storage: {{ .Values.outputPVC.size }}
{{- end }}