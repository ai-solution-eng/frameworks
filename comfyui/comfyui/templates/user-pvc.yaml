{{- if .Values.userPVC.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "comfyui.fullname" . }}-user-pvc
  labels:
    {{- include "comfyui.labels" . | nindent 4 }}
spec:
  accessModes:
  - {{ .Values.userPVC.accessMode }}
  resources:
    requests:
      storage: {{ .Values.userPVC.size }}
{{- end }}
