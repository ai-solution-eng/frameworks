<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toy Web App</title>
  <style>
    body {
      font-family: ui-monospace, monospace;
      background: #0f172a;
      color: #e2e8f0;

  <main>
    <h1>Toy Web App</h1>
