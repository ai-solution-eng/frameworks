apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-svc
  namespace: {{ .Release.Namespace }}
  labels:
    hpe-ezua/type: vendor-service
    hpe-ezua/app: {{ .Chart.Name }}
spec:
  type: ClusterIP
  selector:
    opencode-role: router
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: 8080
