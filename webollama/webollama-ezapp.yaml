apiVersion: ezconfig.hpe.ezaf.com/v1alpha1
kind: EzAppConfig
metadata:
  labels:
    hpe-ezua/imported-app: "true"
  name: webollama-0.1.1
spec:
  backoffLimit: 3
  category: dataEngineering
  chartVersion: 0.1.1
  description: Web UI to manage Ollama
  install: true
  label: WebOllama
  logoImage: 
  name: webollama
  options:
    create-namespace: "true"
    namespace: webollama
    timeout: 45m
    wait: "true"
  values: |
    ezua:
      enabled: true
      virtualService:
        endpoint: "webollama.${DOMAIN_NAME}"
        istioGateway: "istio-system/ezaf-gateway"

    replicaCount: 1

    image:
      repository: ghcr.io/dkruyt/webollama
      pullPolicy: IfNotPresent
      tag: "latest"

    # Endpoint for Ollama - update this to point to your Ollama service
    ollamaUrl: "http://ollama.ollama.svc.cluster.local:11434"

    secretKey: "change-in-production"

    serviceAccount:
      create: true
      name: ""

    service:
      type: ClusterIP
      port: 5000

    ingress:
      enabled: false

    resources: {}

    nodeSelector: {}
    tolerations: []
    affinity: {}

  version: ""