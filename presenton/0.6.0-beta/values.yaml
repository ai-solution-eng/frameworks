# Default values for presenton.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
---
# PCAI-specific
ezua:
  virtualService:
    endpoint: "presenton.${DOMAIN_NAME}"
    istioGateway: "istio-system/ezaf-gateway"

replicaCount: 1

image:
  repository: ghcr.io/presenton/presenton
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels:
  hpe-ezua/app: presenton
  hpe-ezua/type: vendor-service  
  # sidecar.istio.io/inject: "true" # Add for Istio-proxy sidecar
  # add-ezua-proxy: "true" # Add for Proxy environment

env: {}


podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

resources: 
  limits:
    cpu: 8000m
    memory: 8192Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
readinessProbe:
  httpGet:
    path: /healthz
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

llmProxy:
  enabled: true
  image:
    repository: geuntakroh/presenton-llm-proxy
    tag: "v0.0.1"
    pullPolicy: IfNotPresent
  env:
    upstreamLlmUrl: "" # Mandatory for llmProxy service, include /v1 in the url
  service:
    type: ClusterIP
    port: 80
  livenessProbe:
    httpGet:
      path: /health
      port: http
  readinessProbe:
    httpGet:
      path: /health
      port: http    

# -- External Database Configuration
# if url is not specified, the application will use a local sqlite database.
database:
  # DATABASE_URL environment variable
  # Format: postgresql://user:password@host:port/dbname (Refence: https://docs.presenton.ai/configurations/using-external-database)
  url: ""

persistence:
  # -- Enable persistence using PVC for SQLite
  enabled: false
  # -- Storage class of the Presenton PVC
  storageClass: "gl4f-filesystem" # nfs-csi for PCAI Dev-kit
  # -- If using multiple replicas, you must update accessModes to ReadWriteMany
  accessModes:
    - ReadWriteMany
  # -- Size of the presenton PVC
  size: 8Gi
  # -- MountPath of the presenton PVC 
  mountPath: /app_data
  # -- Use existingClaim if you want to re-use an existing Presenton PVC instead of creating a new one
  existingClaim: ""
  # -- Additional annotations to add to the PVC
  annotations: {}

# Additional volumes on the output Deployment definition.
volumes: []
# volumes: 
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# volumeMounts:
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

nodeSelector: {}

tolerations: []

affinity: {}