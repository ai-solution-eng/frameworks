{{- if .Values.llmProxy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: "{{ include "presenton.fullname" . }}-llm-proxy"
  labels:
    {{- include "presenton.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm-proxy
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "presenton.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: llm-proxy
{{- end}}
  
