apiVersion: v1
kind: Service
metadata:
  name: {{ include "clamav.fullname" . }}-api
  labels:
    {{- include "clamav.api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.clamavApi.service.type }}
  ports:
    - port: {{ .Values.clamavApi.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "clamav.api.selectorLabels" . | nindent 4 }}
