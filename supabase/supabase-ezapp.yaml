    environment:
      analytics:
        LOGFLARE_NODE_HOST: 127.0.0.1
        DB_USERNAME: supabase_admin
        DB_DATABASE: _supabase
        DB_PORT: 5432
        DB_DRIVER: postgresql
        DB_SCHEMA: _analytics
        POSTGRES_BACKEND_SCHEMA: _analytics
        LOGFLARE_SINGLE_TENANT: "true"
        LOGFLARE_SUPABASE_MODE: "true"
        LOGFLARE_FEATURE_FLAG_OVERRIDE: multibackend=true

      auth:
        DB_USER: supabase_auth_admin
        DB_PORT: 5432
        DB_DRIVER: postgres
        ## SSL mode options: disable, allow, prefer, require, verify-ca, verify-full
        DB_SSL: disable
        API_EXTERNAL_URL: https://supabase.${DOMAIN_NAME}/auth
        GOTRUE_API_HOST: "0.0.0.0"
        GOTRUE_API_PORT: "9999"
        GOTRUE_SITE_URL: https://supabase.${DOMAIN_NAME}
        GOTRUE_URI_ALLOW_LIST: "*"
        GOTRUE_DISABLE_SIGNUP: "false"
        GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
        GOTRUE_JWT_ADMIN_ROLES: service_role
        GOTRUE_JWT_AUD: authenticated
        GOTRUE_JWT_EXP: "3600"
        GOTRUE_EXTERNAL_EMAIL_ENABLED: "false"
        GOTRUE_MAILER_AUTOCONFIRM: "true"
        GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: "false"
        GOTRUE_EXTERNAL_KEYCLOAK_ENABLED: "true"
        GOTRUE_EXTERNAL_KEYCLOAK_CLIENT_ID: "${OIDC_CLIENT_ID}"
        GOTRUE_EXTERNAL_KEYCLOAK_SECRET: "${OIDC_CLIENT_SECRET}"
        GOTRUE_EXTERNAL_KEYCLOAK_URL: "https://keycloak.${DOMAIN_NAME}/realms/UA"
        GOTRUE_EXTERNAL_KEYCLOAK_REDIRECT_URI: "https://supabase.${DOMAIN_NAME}/auth/v1/callback"
        # GOTRUE_MAILER_SECURE_EMAIL_CHANGE_ENABLED: true
        # GOTRUE_SMTP_MAX_FREQUENCY: 1s
        GOTRUE_SMTP_ADMIN_EMAIL: "SMTP_ADMIN_MAIL"
        GOTRUE_SMTP_HOST: "SMTP_HOST"
        GOTRUE_SMTP_PORT: "123"
        GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
        GOTRUE_SMS_AUTOCONFIRM: "false"
        GOTRUE_SMTP_SENDER_NAME: "SMTP_SENDER_NAME"
        GOTRUE_MAILER_URLPATHS_INVITE: "/auth/v1/verify"
        GOTRUE_MAILER_URLPATHS_CONFIRMATION: "/auth/v1/verify"
        GOTRUE_MAILER_URLPATHS_RECOVERY: "/auth/v1/verify"
        GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: "/auth/v1/verify"
        ## Uncomment to enable custom access token hook. Please see: https://supabase.com/docs/guides/auth/auth-hooks
        ## for full list of hooks and additional details about custom_access_token_hook
        # GOTRUE_HOOK_CUSTOM_ACCESS_TOKEN_ENABLED: "true"
        # GOTRUE_HOOK_CUSTOM_ACCESS_TOKEN_URI: "pg-functions://postgres/public/custom_access_token_hook"
        # GOTRUE_HOOK_CUSTOM_ACCESS_TOKEN_SECRETS: "<standard-base64-secret>"
        # GOTRUE_HOOK_MFA_VERIFICATION_ATTEMPT_ENABLED: "true"
        # GOTRUE_HOOK_MFA_VERIFICATION_ATTEMPT_URI: "pg-functions://postgres/public/mfa_verification_attempt"
        # GOTRUE_HOOK_PASSWORD_VERIFICATION_ATTEMPT_ENABLED: "true"
        # GOTRUE_HOOK_PASSWORD_VERIFICATION_ATTEMPT_URI: "pg-functions://postgres/public/password_verification_attempt"
        # GOTRUE_HOOK_SEND_SMS_ENABLED: "false"
        # GOTRUE_HOOK_SEND_SMS_URI: "pg-functions://postgres/public/custom_access_token_hook"
        # GOTRUE_HOOK_SEND_SMS_SECRETS: "v1,whsec_VGhpcyBpcyBhbiBleGFtcGxlIG9mIGEgc2hvcnRlciBCYXNlNjQgc3RyaW5n"
        # GOTRUE_HOOK_SEND_EMAIL_ENABLED: "false"
        # GOTRUE_HOOK_SEND_EMAIL_URI: "http://host.docker.internal:54321/functions/v1/email_sender"
        # GOTRUE_HOOK_SEND_EMAIL_SECRETS: "v1,whsec_VGhpcyBpcyBhbiBleGFtcGxlIG9mIGEgc2hvcnRlciBCYXNlNjQgc3RyaW5n"

      db:
        POSTGRES_HOST: /var/run/postgresql
        PGPORT: "5432"
        POSTGRES_PORT: "5432"
        JWT_EXP: 3600
        # POSTGRES_HOST_AUTH_METHOD: md5
        ## Enable SSL for postgres by specifying paths for mounted certificate key pair
        # POSTGRES_SSL_CERT: /path/to/ssl/server.crt
        # POSTGRES_SSL_KEY: /path/to/ssl/server.key

      functions:
        DB_USERNAME: postgres
        DB_PORT: 5432
        DB_DRIVER: postgresql
        ## SSL mode options: disable, allow, prefer, require, verify-ca, verify-full
        DB_SSL: disable
        VERIFY_JWT: false

      imgproxy:
        IMGPROXY_BIND: ":5001"
        IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
        IMGPROXY_USE_ETAG: "true"
        IMGPROXY_ENABLE_WEBP_DETECTION: "true"

      kong:
        KONG_DATABASE: "off"
        KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
        ## https://github.com/supabase/cli/issues/14
        KONG_DNS_ORDER: LAST,A,CNAME
        KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
        KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
        KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
        KONG_LOG_LEVEL: warn

      meta:
        DB_USER: supabase_admin
        DB_PORT: 5432
        DB_DRIVER: postgres
        ## SSL mode options: disable, allow, prefer, require, verify-ca, verify-full
        DB_SSL: disable
        PG_META_PORT: "8080"

      minio: {}

      realtime:
        DB_USER: supabase_admin
        DB_PORT: 5432
        ## Set to true to enforce TLS connections to Postgres
        DB_SSL: false
        PORT: "4000"
        FLY_ALLOC_ID: fly123
        FLY_APP_NAME: realtime
        ENABLE_TAILSCALE: "false"
        DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
        DB_ENC_KEY: supabaserealtime
        ERL_AFLAGS: -proto_dist inet_tcp
        DNS_NODES: "''"
        RLIMIT_NOFILE: "10000"
        APP_NAME: realtime
        SEED_SELF_HOST: true
        RUN_JANITOR: true

      rest:
        DB_USER: authenticator
        DB_PORT: 5432
        DB_DRIVER: postgres
        ## SSL mode options: disable, allow, prefer, require, verify-ca, verify-full
        DB_SSL: disable
        PGRST_DB_SCHEMAS: public,storage,graphql_public,nexus
        PGRST_DB_ANON_ROLE: anon
        PGRST_DB_USE_LEGACY_GUCS: false
        PGRST_APP_SETTINGS_JWT_EXP: 3600

      storage:
        DB_USER: supabase_storage_admin
        DB_PORT: 5432
        DB_DRIVER: postgres
        ## SSL mode options: disable, allow, prefer, require, verify-ca, verify-full
        DB_SSL: disable
        REQUEST_ALLOW_X_FORWARDED_PATH: "true"
        FILE_SIZE_LIMIT: "52428800"
        FILE_STORAGE_BACKEND_PATH: /var/lib/storage
        TENANT_ID: stub
        REGION: eu-west-2
        ENABLE_IMAGE_TRANSFORMATION: "true"

      studio:
        HOSTNAME: "::"
        STUDIO_PORT: "3000"
        POSTGRES_PORT: 5432
        DEFAULT_ORGANIZATION_NAME: HPE
        DEFAULT_PROJECT_NAME: PCAI
        SUPABASE_PUBLIC_URL: https://supabase.${DOMAIN_NAME}
        NEXT_PUBLIC_ENABLE_LOGS: true
        ## Set value to bigquery to use Big Query backend for analytics (postgres or bigquery)
        NEXT_ANALYTICS_BACKEND_PROVIDER: postgres

      vector: {}

